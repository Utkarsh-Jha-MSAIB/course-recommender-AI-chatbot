<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fordham AI Course Recommender</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <style>
        .reco-action-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        .feedback-icon-button {
            border: 1px solid #ddd7da;
            background: #fff;
            border-radius: 10px;
            padding: 8px 10px;
            cursor: pointer;
            font-size: 15px;
            line-height: 1;
            transition: all 0.2s ease;
        }

        .feedback-icon-button:hover {
            transform: translateY(-1px);
            border-color: #c7b8be;
            box-shadow: 0 6px 14px rgba(41, 35, 33, 0.08);
        }

        .feedback-icon-button.active-up {
            background: #e9f8ef;
            border-color: #4caf50;
        }

        .feedback-icon-button.active-down {
            background: #fdecec;
            border-color: #d9534f;
        }

        .reco-feedback-card {
            margin-top: 10px;
            border: 1px solid #ece3e6;
            border-radius: 12px;
            padding: 10px;
            background: #fcfafb;
        }

        .reco-feedback-title {
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 7px;
            color: var(--fordham-black);
        }

        .reco-feedback-textarea {
            width: 100%;
            min-height: 60px;
            resize: vertical;
            border: 1px solid #d9d9d9;
            border-radius: 10px;
            padding: 9px 11px;
            font: inherit;
            font-size: 0.85rem;
            box-sizing: border-box;
            background: #fff;
        }

        .reco-feedback-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 8px;
        }

        .reco-feedback-submit {
            border: none;
            border-radius: 999px;
            padding: 8px 12px;
            cursor: pointer;
            font: inherit;
            font-size: 0.82rem;
            font-weight: 700;
        }

        .reco-feedback-status {
            margin-top: 7px;
            font-size: 12px;
            color: #666;
        }

        .user-file-bubble {
            max-width: 360px;
            background: var(--fordham-maroon);
            color: #fff;
            border-radius: 18px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            box-shadow: 0 12px 28px rgba(134, 0, 40, 0.24);
            transition: all 0.2s ease;
        }

        .user-file-bubble:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 34px rgba(134, 0, 40, 0.32);
        }

        .user-file-icon {
            width: 34px;
            height: 34px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.16);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .user-file-info {
            min-width: 0;
        }

        .user-file-name {
            font-weight: 800;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-file-meta {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 2px;
        }

        .file-preview-modal {
            position: fixed;
            inset: 0;
            background: rgba(20, 8, 14, 0.72);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px;
        }

        .file-preview-modal.hidden {
            display: none;
        }

        .file-preview-shell {
            width: min(960px, 92vw);
            height: min(860px, 92vh);
            background: #fff;
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 28px 80px rgba(0, 0, 0, 0.35);
            display: flex;
            flex-direction: column;
        }

        .file-preview-header {
            height: 58px;
            background: var(--fordham-maroon);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 18px 0 22px;
            font-weight: 800;
        }

        .file-preview-header button {
            width: 36px;
            height: 36px;
            border-radius: 999px;
            border: none;
            background: rgba(255, 255, 255, 0.16);
            color: #fff;
            font-size: 18px;
            cursor: pointer;
        }

        .file-preview-frame {
            flex: 1;
            width: 100%;
            border: none;
            background: #f7f3f5;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="site-header-top">
            <div class="site-header-inner site-header-row">
                <div class="topbar-brand">
                    <span>Fordham University</span>
                </div>

                <a href="/analytics" class="top-analytics-link">Analytics</a>
            </div>
        </div>
    </header>

    <main class="page-shell">
        <div class="app-shell">
            <aside class="sidebar">
                <div class="panel-card reco-panel">
                    <div class="section-header premium-header sidebar-header">
                        <div class="section-header-left">
                            <div class="section-header-icon-wrap">
                                <img
                                    src="{{ url_for('static', filename='fordham_logo.png') }}"
                                    alt="Fordham University"
                                    class="section-header-logo"
                                />
                            </div>

                            <div class="section-header-text">
                                <h2>AI Course Recommender</h2>
                            </div>
                        </div>
                    </div>

                    <div id="recommendation-rail" class="recommendation-rail">
                        <div class="empty-reco-state">
                            Your recommendations will appear here after the questionnaire.
                        </div>
                    </div>
                </div>
            </aside>

            <section class="main-stage">
                <div class="chat-hero-banner">
                    <div class="chat-hero-top-row">
                        <div class="chat-hero-left">
                            <div class="chat-hero-pill">Fordham AI Assistant</div>
                        </div>
                        <button id="clear-button" class="chat-hero-clear-button">Clear Chat</button>
                    </div>

                    <h1>Find the right courses for your goals</h1>
                    <p>Get course recommendations tailored to your background, interests, and time commitment.</p>
                </div>

                <section class="chat-window">
                    <div id="chat-messages" class="chat-messages"></div>

                    <div id="typing-indicator" class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>

                    <div class="input-container">
                        <button id="attach-button" class="attach-button" title="Upload resume (PDF, DOCX, TXT)">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.41 17.41a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                            </svg>
                        </button>

                        <input type="file" id="resume-file-input" accept=".pdf,.docx,.txt" style="display:none" />

                        <textarea
                            id="user-input"
                            rows="1"
                            placeholder="Start by saying hi or answer the current question..."
                            autocomplete="off"
                        ></textarea>

                        <button id="send-button" class="primary-button send-button">
                            <span class="send-button-label">Send</span>
                        </button>
                    </div>
                </section>
            </section>
        </div>
    </main>

    <div id="filePreviewModal" class="file-preview-modal hidden">
        <div class="file-preview-shell">
            <div class="file-preview-header">
                <span id="filePreviewTitle">Resume Preview</span>
                <button onclick="closeFilePreview()">✕</button>
            </div>

            <iframe id="filePreviewFrame" class="file-preview-frame"></iframe>
        </div>
    </div>

    <script>
        let currentSessionId = null;
        let allRecommendations = [];
        let recommendationPage = 0;
        const RECO_PER_PAGE = 1;

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text ?? "";
            return div.innerHTML;
        }

        function extractOptionsMarker(content) {
            const match = content.match(/\[\[OPTIONS:(.*?)\]\]/s);
            if (!match) return null;
            return match[1].split("||").map(x => x.trim()).filter(Boolean);
        }

        function extractSkillDropdownMarker(content) {
            const match = content.match(/\[\[SKILL_DROPDOWN:(.*?)\]\]/s);
            if (!match) return null;
            return match[1].split("||").map(x => x.trim()).filter(Boolean);
        }

        function hasAwaitCustomSkill(content) {
            return /\[\[AWAIT_CUSTOM_SKILL\]\]/.test(content || "");
        }

        function stripMarkers(content) {
            return (content || "")
                .replace(/\n?\[\[OPTIONS:.*?\]\]/s, "")
                .replace(/\n?\[\[SKILL_DROPDOWN:.*?\]\]/s, "")
                .replace(/\n?\[\[AWAIT_CUSTOM_SKILL\]\]/g, "")
                .replace(/\n?\[\[STATE:.*?\]\]/g, "")
                .trim();
        }

        function buildMessageHtml(content) {
            const tipsContents = [];
            const withPlaceholders = (content || "").replace(/\[\[TIPS\]\]([\s\S]*?)\[\[\/TIPS\]\]/g, (_, inner) => {
                tipsContents.push(inner.trim());
                return "__TIPS_BLOCK__";
            });

            const cleaned = stripMarkers(withPlaceholders);
            let html = escapeHtml(cleaned)
                .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
                .replace(/\n/g, "<br>");

            tipsContents.forEach(tips => {
                const cardInner = escapeHtml(tips)
                    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
                    .replace(/\n/g, "<br>");
                html = html.replace("__TIPS_BLOCK__", `<div class="tips-card">${cardInner}</div>`);
            });

            return html;
        }

        function setInputMode(mode = "default") {
            const input = document.getElementById("user-input");
            if (!input) return;

            if (mode === "custom-skill") {
                input.placeholder = "Type your custom skill focus here...";
                input.dataset.mode = "custom-skill";
                input.focus();
            } else {
                input.placeholder = "Start by saying hi or answer the current question...";
                input.dataset.mode = "default";
            }
        }

        function addMessage(content, isUser = false) {
            const messagesDiv = document.getElementById("chat-messages");
            if (!messagesDiv) return;

            const wrapper = document.createElement("div");
            wrapper.className = `message-row ${isUser ? "user-row" : "bot-row"}`;

            const block = document.createElement("div");
            block.className = "message-block";

            const bubble = document.createElement("div");
            bubble.className = `message-bubble ${isUser ? "user-message" : "bot-message"}`;
            bubble.innerHTML = buildMessageHtml(content);

            block.appendChild(bubble);

            if (!isUser) {
                const skillOptions = extractSkillDropdownMarker(content);
                const regularOptions = extractOptionsMarker(content);

                if (skillOptions && skillOptions.length) {
                    const skillWrap = document.createElement("div");
                    skillWrap.className = "skill-picker-wrap";

                    const row = document.createElement("div");
                    row.className = "skill-picker-row";

                    const select = document.createElement("select");
                    select.className = "skill-select";

                    const defaultOption = document.createElement("option");
                    defaultOption.value = "";
                    defaultOption.textContent = "Choose a focus area";
                    defaultOption.selected = true;
                    defaultOption.disabled = true;
                    select.appendChild(defaultOption);

                    skillOptions.forEach(optionText => {
                        const opt = document.createElement("option");
                        opt.value = optionText;
                        opt.textContent = optionText;
                        select.appendChild(opt);
                    });

                    const continueBtn = document.createElement("button");
                    continueBtn.type = "button";
                    continueBtn.className = "skill-select-button";
                    continueBtn.textContent = "Continue";

                    continueBtn.onclick = () => {
                        const selected = select.value;
                        if (!selected) return;
                        select.disabled = true;
                        continueBtn.disabled = true;
                        continueBtn.classList.add("option-chip-disabled");
                        sendMessage(selected);
                    };

                    row.appendChild(select);
                    row.appendChild(continueBtn);
                    skillWrap.appendChild(row);
                    block.appendChild(skillWrap);
                } else if (regularOptions && regularOptions.length) {
                    const optionGroup = document.createElement("div");
                    optionGroup.className = "option-group";

                    regularOptions.forEach(optionText => {
                        const btn = document.createElement("button");
                        btn.className = "option-chip";
                        btn.type = "button";
                        btn.textContent = optionText;
                        btn.onclick = () => {
                            disableOptionGroup(optionGroup, btn);
                            sendMessage(optionText);
                        };
                        optionGroup.appendChild(btn);
                    });

                    block.appendChild(optionGroup);
                }

                if (hasAwaitCustomSkill(content)) {
                    setInputMode("custom-skill");
                } else {
                    setInputMode("default");
                }
            }

            wrapper.appendChild(block);
            messagesDiv.appendChild(wrapper);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addUserFileMessage(fileName, fileUrl) {
            const messagesDiv = document.getElementById("chat-messages");
            if (!messagesDiv) return;

            const wrapper = document.createElement("div");
            wrapper.className = "message-row user-row";

            const block = document.createElement("div");
            block.className = "message-block";

            const bubble = document.createElement("div");
            bubble.className = "user-file-bubble";

            bubble.innerHTML = `
                <div class="user-file-icon">📎</div>
                <div class="user-file-info">
                    <div class="user-file-name">${escapeHtml(fileName)}</div>
                    <div class="user-file-meta">Click to preview</div>
                </div>
            `;

            bubble.onclick = () => openFilePreview(fileUrl, fileName);

            block.appendChild(bubble);
            wrapper.appendChild(block);
            messagesDiv.appendChild(wrapper);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function openFilePreview(fileUrl, fileName) {
            const title = document.getElementById("filePreviewTitle");
            const frame = document.getElementById("filePreviewFrame");
            const modal = document.getElementById("filePreviewModal");

            if (title) title.textContent = fileName;
            if (frame) frame.src = fileUrl;
            if (modal) modal.classList.remove("hidden");
        }

        function closeFilePreview() {
            const frame = document.getElementById("filePreviewFrame");
            const modal = document.getElementById("filePreviewModal");

            if (frame) frame.src = "";
            if (modal) modal.classList.add("hidden");
        }

        function disableOptionGroup(optionGroup, selectedButton = null) {
            const buttons = optionGroup.querySelectorAll("button");
            buttons.forEach(btn => {
                btn.disabled = true;
                btn.classList.add("option-chip-disabled");
                if (selectedButton && btn === selectedButton) {
                    btn.classList.add("option-chip-selected");
                }
            });
        }

        function showTyping(show = true) {
            const indicator = document.getElementById("typing-indicator");
            if (!indicator) return;
            indicator.style.display = show ? "flex" : "none";
        }

        function createSkillPill(skill) {
            const pill = document.createElement("span");
            pill.className = "flash-skill-pill";
            pill.textContent = skill;
            return pill;
        }

        function formatOneDecimal(value) {
            if (value === null || value === undefined || value === "") return "N/A";
            const num = Number(value);
            return Number.isFinite(num) ? `${num.toFixed(1)} hours` : String(value);
        }

        function formatScore(value) {
            if (value === null || value === undefined || value === "") return "N/A";
            const num = Number(value);
            return Number.isFinite(num) ? num.toFixed(2) : String(value);
        }

        async function postRecommendationRating(course, ratingValue) {
            const response = await fetch("/recommendation/rate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    session_id: currentSessionId,
                    recommendation_tracking_id: course.recommendation_tracking_id,
                    course_name: course.course_name || "",
                    course_rank: course.recommendation_rank || "",
                    course_url: course.url || "",
                    rating_value: ratingValue
                })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data.error || "Unable to save rating.");
            return data;
        }

        async function postRecommendationFeedback(course, feedbackText) {
            const response = await fetch("/recommendation/feedback", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    session_id: currentSessionId,
                    recommendation_tracking_id: course.recommendation_tracking_id,
                    course_name: course.course_name || "",
                    course_rank: course.recommendation_rank || "",
                    course_url: course.url || "",
                    feedback_text: feedbackText
                })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data.error || "Unable to save feedback.");
            return data;
        }

        function renderRecommendationRail(courses = allRecommendations) {
            const rail = document.getElementById("recommendation-rail");
            if (!rail) return;

            rail.innerHTML = "";

            if (!courses || !Array.isArray(courses) || !courses.length) {
                allRecommendations = [];
                recommendationPage = 0;
                rail.innerHTML = '<div class="empty-reco-state">Your recommendations will appear here after the questionnaire.</div>';
                return;
            }

            allRecommendations = courses;

            const totalPages = Math.ceil(courses.length / RECO_PER_PAGE);
            if (recommendationPage >= totalPages) recommendationPage = 0;

            const start = recommendationPage * RECO_PER_PAGE;
            const visibleCourses = courses.slice(start, start + RECO_PER_PAGE);

            visibleCourses.forEach((course, idx) => {
                const courseNumber = start + idx + 1;

                const card = document.createElement("article");
                card.className = "reco-flashcard";

                const countBadge = document.createElement("div");
                countBadge.className = "reco-floating-count";
                countBadge.textContent = String(courseNumber);

                const prevBtn = document.createElement("button");
                prevBtn.type = "button";
                prevBtn.className = "reco-side-nav reco-side-nav-left";
                prevBtn.setAttribute("aria-label", "Previous recommendation");
                prevBtn.innerHTML = "&#8249;";
                prevBtn.disabled = recommendationPage === 0;
                prevBtn.onclick = goToPreviousRecommendations;

                const nextBtn = document.createElement("button");
                nextBtn.type = "button";
                nextBtn.className = "reco-side-nav reco-side-nav-right";
                nextBtn.setAttribute("aria-label", "Next recommendation");
                nextBtn.innerHTML = "&#8250;";
                nextBtn.disabled = recommendationPage >= totalPages - 1;
                nextBtn.onclick = goToNextRecommendations;

                const media = document.createElement("div");
                media.className = "reco-flashcard-media";

                if (course.image_url) {
                    const img = document.createElement("img");
                    img.className = "reco-flashcard-image";
                    img.src = course.image_url;
                    img.alt = "Course image";
                    img.loading = "lazy";
                    img.onerror = function () {
                        media.classList.add("no-image");
                        media.innerHTML = `
                            <div class="image-fallback">
                                <span>Fordham AI</span>
                            </div>
                        `;
                    };
                    media.appendChild(img);
                } else {
                    media.classList.add("no-image");
                    media.innerHTML = `
                        <div class="image-fallback">
                            <span>Fordham AI</span>
                        </div>
                    `;
                }

                const content = document.createElement("div");
                content.className = "reco-flashcard-content";

                const metaGrid = document.createElement("div");
                metaGrid.className = "reco-meta-grid";

                const domainItem = document.createElement("div");
                domainItem.className = "meta-chip";
                domainItem.innerHTML = `<span class="meta-label">Domain</span><span class="meta-value">${escapeHtml(course.domain_partner || course.domain || "General")}</span>`;

                const hoursItem = document.createElement("div");
                hoursItem.className = "meta-chip";
                hoursItem.innerHTML = `<span class="meta-label">Duration</span><span class="meta-value">${escapeHtml(formatOneDecimal(course.hours || course.hours_value || course.hours_rating))}</span>`;

                metaGrid.appendChild(domainItem);
                metaGrid.appendChild(hoursItem);

                const skillsWrap = document.createElement("div");
                skillsWrap.className = "reco-skills-wrap";

                const skillsLabel = document.createElement("div");
                skillsLabel.className = "reco-section-label";
                skillsLabel.textContent = "Top Skills";

                const skillsList = document.createElement("div");
                skillsList.className = "reco-skills-list";

                const skills = Array.isArray(course.skills) ? course.skills.slice(0, 3) : [];
                if (skills.length) {
                    skills.forEach(skill => skillsList.appendChild(createSkillPill(skill)));
                } else {
                    skillsList.appendChild(createSkillPill("General Learning"));
                }

                skillsWrap.appendChild(skillsLabel);
                skillsWrap.appendChild(skillsList);

                const scoreWrap = document.createElement("div");
                scoreWrap.className = "score-wrap";

                const scoreList = document.createElement("div");
                scoreList.className = "score-list";

                const semanticScore = document.createElement("div");
                semanticScore.className = "score-pill";
                semanticScore.textContent = `Match Score: ${formatScore(course.semantic_score)}`;

                const finalScore = document.createElement("div");
                finalScore.className = "score-pill";
                finalScore.textContent = `Overall Fit: ${formatScore(course.final_score)}`;

                scoreList.appendChild(semanticScore);
                scoreList.appendChild(finalScore);
                scoreWrap.appendChild(scoreList);

                const footer = document.createElement("div");
                footer.className = "reco-flashcard-footer";

                if (course.url) {
                    const link = document.createElement("a");
                    link.className = "course-link-button";
                    link.href = course.url;
                    link.target = "_blank";
                    link.rel = "noopener noreferrer";
                    link.textContent = "View Course";
                    footer.appendChild(link);
                }

                const actionGroup = document.createElement("div");
                actionGroup.className = "reco-action-group";

                const currentRating = Number(course.user_feedback_rating || 0);

                const thumbsUpBtn = document.createElement("button");
                thumbsUpBtn.type = "button";
                thumbsUpBtn.className = `feedback-icon-button ${currentRating === 1 ? "active-up" : ""}`;
                thumbsUpBtn.setAttribute("aria-label", "Thumbs up");
                thumbsUpBtn.textContent = "👍";

                thumbsUpBtn.onclick = async () => {
                    const nextValue = Number(course.user_feedback_rating || 0) === 1 ? 0 : 1;
                    thumbsUpBtn.disabled = true;
                    thumbsUpBtn.style.opacity = "0.6";
                    try {
                        await postRecommendationRating(course, nextValue);
                        course.user_feedback_rating = nextValue;
                        renderRecommendationRail(allRecommendations);
                    } catch (error) {
                        console.error("RATING ERROR FULL:", error);
                        alert("DEBUG: " + (error.message || JSON.stringify(error) || "unknown"));
                    } finally {
                        thumbsUpBtn.disabled = false;
                        thumbsUpBtn.style.opacity = "";
                    }
                };

                const thumbsDownBtn = document.createElement("button");
                thumbsDownBtn.type = "button";
                thumbsDownBtn.className = `feedback-icon-button ${currentRating === -1 ? "active-down" : ""}`;
                thumbsDownBtn.setAttribute("aria-label", "Thumbs down");
                thumbsDownBtn.textContent = "👎";

                thumbsDownBtn.onclick = async () => {
                    const nextValue = Number(course.user_feedback_rating || 0) === -1 ? 0 : -1;
                    thumbsDownBtn.disabled = true;
                    thumbsDownBtn.style.opacity = "0.6";
                    try {
                        await postRecommendationRating(course, nextValue);
                        course.user_feedback_rating = nextValue;
                        renderRecommendationRail(allRecommendations);
                    } catch (error) {
                        console.error("RATING ERROR FULL:", error);
                        alert("DEBUG: " + (error.message || JSON.stringify(error) || "unknown"));
                    } finally {
                        thumbsDownBtn.disabled = false;
                        thumbsDownBtn.style.opacity = "";
                    }
                };

                actionGroup.appendChild(thumbsUpBtn);
                actionGroup.appendChild(thumbsDownBtn);
                footer.appendChild(actionGroup);

                const feedbackCard = document.createElement("div");
                feedbackCard.className = "reco-feedback-card";

                const feedbackTitle = document.createElement("div");
                feedbackTitle.className = "reco-feedback-title";
                feedbackTitle.textContent = "Have feedback?";

                const feedbackTextarea = document.createElement("textarea");
                feedbackTextarea.className = "reco-feedback-textarea";
                feedbackTextarea.placeholder = "Tell us why this recommendation was helpful or not relevant...";

                const feedbackActions = document.createElement("div");
                feedbackActions.className = "reco-feedback-actions";

                const feedbackSubmit = document.createElement("button");
                feedbackSubmit.type = "button";
                feedbackSubmit.className = "primary-button reco-feedback-submit";
                feedbackSubmit.textContent = "Submit Feedback";

                const feedbackStatus = document.createElement("div");
                feedbackStatus.className = "reco-feedback-status";

                feedbackSubmit.onclick = async () => {
                    const feedbackText = feedbackTextarea.value.trim();
                    if (!feedbackText) {
                        feedbackStatus.textContent = "Please enter feedback before submitting.";
                        return;
                    }

                    feedbackSubmit.disabled = true;
                    feedbackTextarea.disabled = true;
                    feedbackStatus.textContent = "Saving feedback...";

                    try {
                        await postRecommendationFeedback(course, feedbackText);
                        feedbackStatus.textContent = "Thanks! Your feedback was saved.";
                        feedbackTextarea.value = "";
                    } catch (error) {
                        console.error("FEEDBACK ERROR FULL:", error);
                        feedbackStatus.textContent = error.message || "Could not save feedback right now.";
                    } finally {
                        feedbackSubmit.disabled = false;
                        feedbackTextarea.disabled = false;
                    }
                };

                feedbackActions.appendChild(feedbackSubmit);

                content.appendChild(metaGrid);
                content.appendChild(skillsWrap);
                content.appendChild(scoreWrap);
                content.appendChild(footer);

                feedbackCard.appendChild(feedbackTitle);
                feedbackCard.appendChild(feedbackTextarea);
                feedbackCard.appendChild(feedbackActions);
                feedbackCard.appendChild(feedbackStatus);

                content.appendChild(feedbackCard);

                card.appendChild(countBadge);
                card.appendChild(prevBtn);
                card.appendChild(nextBtn);
                card.appendChild(media);
                card.appendChild(content);
                rail.appendChild(card);
            });
        }

        function goToPreviousRecommendations() {
            if (recommendationPage > 0) {
                recommendationPage -= 1;
                renderRecommendationRail(allRecommendations);
            }
        }

        function goToNextRecommendations() {
            const totalPages = Math.ceil(allRecommendations.length / RECO_PER_PAGE);
            if (recommendationPage < totalPages - 1) {
                recommendationPage += 1;
                renderRecommendationRail(allRecommendations);
            }
        }

        async function sendMessage(customMessage = null) {
            const input = document.getElementById("user-input");
            if (!input) return;

            const message = (customMessage || input.value).trim();
            if (!message) return;

            addMessage(message, true);
            input.value = "";
            input.style.height = "auto";
            setInputMode("default");
            showTyping(true);

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: message,
                        session_id: currentSessionId
                    })
                });

                const data = await response.json();
                showTyping(false);

                if (data.session_id) currentSessionId = data.session_id;

                if (data.response) {
                    addMessage(data.response, false);
                } else if (data.text) {
                    addMessage(data.text, false);
                } else {
                    addMessage("Sorry, something went wrong. Please try again.", false);
                }

                const returnedCourses = Array.isArray(data.courses) ? data.courses : [];
                recommendationPage = 0;
                renderRecommendationRail(returnedCourses);
            } catch (error) {
                showTyping(false);
                addMessage("Sorry, there was an error connecting to the chatbot.", false);
                console.error(error);
            }
        }

        async function clearChat() {
            try {
                await fetch("/clear_history", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        session_id: currentSessionId
                    })
                });

                currentSessionId = null;

                const messagesDiv = document.getElementById("chat-messages");
                if (messagesDiv) messagesDiv.innerHTML = "";

                allRecommendations = [];
                recommendationPage = 0;
                renderRecommendationRail([]);
                setInputMode("default");
                addWelcomeMessage();
            } catch (error) {
                console.error(error);
                addMessage("Unable to clear chat right now.", false);
            }
        }

        function addWelcomeMessage() {
            addMessage(
                "Hi! I’m your Fordham AI Course Recommendation Assistant.\n\nI’ll ask you a few quick questions and then recommend courses that fit your goals.",
                false
            );
        }

        document.addEventListener("DOMContentLoaded", function () {
            const sendButton = document.getElementById("send-button");
            const userInput = document.getElementById("user-input");
            const clearButton = document.getElementById("clear-button");

            if (sendButton) sendButton.addEventListener("click", () => sendMessage());

            if (userInput) {
                userInput.addEventListener("keydown", function(event) {
                    if (event.key === "Enter" && !event.shiftKey) {
                        event.preventDefault();
                        sendMessage();
                    }
                });
                userInput.addEventListener("input", function() {
                    this.style.height = "auto";
                    this.style.height = Math.min(this.scrollHeight, 180) + "px";
                });
            }

            if (clearButton) clearButton.addEventListener("click", clearChat);

            const attachButton = document.getElementById("attach-button");
            const fileInput = document.getElementById("resume-file-input");

            if (attachButton && fileInput) {
                attachButton.addEventListener("click", () => fileInput.click());

                fileInput.addEventListener("change", async function () {
                    const file = this.files[0];
                    if (!file) return;

                    const allowedTypes = [".pdf", ".docx", ".txt"];
                    const ext = "." + file.name.split(".").pop().toLowerCase();
                    if (!allowedTypes.includes(ext)) {
                        addMessage("Sorry, only PDF, DOCX, and TXT files are supported.", false);
                        this.value = "";
                        return;
                    }

                    attachButton.disabled = true;
                    attachButton.style.opacity = "0.4";

                    const formData = new FormData();
                    formData.append("file", file);

                    try {
                        const res = await fetch("/upload_resume", { method: "POST", body: formData });
                        const data = await res.json();

                        if (data.error) {
                            addMessage(`Could not read the file: ${data.error}`, false);
                        } else {
                            const fileUrl = URL.createObjectURL(file);
                            addUserFileMessage(file.name, fileUrl);
                            showTyping(true);

                            try {
                                const chatRes = await fetch("/chat", {
                                    method: "POST",
                                    headers: { "Content-Type": "application/json" },
                                    body: JSON.stringify({
                                        message: data.text,
                                        session_id: currentSessionId
                                    })
                                });
                                const chatData = await chatRes.json();
                                showTyping(false);

                                if (chatData.session_id) currentSessionId = chatData.session_id;

                                if (chatData.response) addMessage(chatData.response, false);

                                const returnedCourses = Array.isArray(chatData.courses) ? chatData.courses : [];
                                recommendationPage = 0;
                                renderRecommendationRail(returnedCourses);
                            } catch (err) {
                                showTyping(false);
                                addMessage("Sorry, there was an error processing your resume.", false);
                            }
                        }
                    } catch (err) {
                        addMessage("Upload failed. Please try pasting your resume text instead.", false);
                    } finally {
                        attachButton.disabled = false;
                        attachButton.style.opacity = "";
                        this.value = "";
                    }
                });
            }

            renderRecommendationRail([]);
            addWelcomeMessage();
        });
    </script>
</body>
</html>
